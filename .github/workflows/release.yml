name: Build and Release Alazkar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        working-directory: alazkar
        run: |
          flutter pub get
          # زيادة مساحة الذاكرة المخصصة لبناء الأندرويد لحل مشكلة Java heap space
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=512m"
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: azkar-app-apk
          path: alazkar/build/app/outputs/flutter-apk/app-release.apk
